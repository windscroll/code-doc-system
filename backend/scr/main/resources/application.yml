spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: ${PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      force: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true